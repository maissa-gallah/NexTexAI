# ---------------------------------------------------------------------------
# CI — Lint & Test
# ---------------------------------------------------------------------------
# Runs on every push to main and on every pull request.
#
# Jobs:
#   python-lint   — Ruff linting for backend/ and scripts/
#   python-test   — pytest for backend/ and scripts/
#   frontend-lint — ESLint for camera-app/
#   frontend-test — react-scripts test for camera-app/
# ---------------------------------------------------------------------------

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

# ---------------------------------------------------------------------------
# Python — lint
# ---------------------------------------------------------------------------
jobs:
  python-lint:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff (backend)
        run: ruff check .
        working-directory: backend

      - name: Run ruff (scripts)
        run: ruff check .
        working-directory: scripts

  # ---------------------------------------------------------------------------
  # Python — test
  # ---------------------------------------------------------------------------
  python-test:
    name: Python Test (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Mosquitto
        run: |
          cat > /tmp/mosquitto.conf << 'EOF'
          listener 1883
          allow_anonymous true
          EOF
          docker run -d --rm --name mosquitto \
            -p 1883:1883 \
            -v /tmp/mosquitto.conf:/mosquitto/config/mosquitto.conf \
            eclipse-mosquitto:2
          # Wait for Mosquitto to accept connections
          for i in $(seq 1 10); do
            nc -z localhost 1883 && break
            sleep 1
          done

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio httpx

      - name: Run pytest (backend)
        run: pytest -v --tb=short
        working-directory: backend
        env:
          BROKER_HOST: localhost
          BROKER_PORT: 1883
          RABBITMQ_HOST: localhost

      - name: Run pytest (scripts)
        run: pytest -v --tb=short || echo "No tests found in scripts/"
        working-directory: scripts
        env:
          BROKER_HOST: localhost
          BROKER_PORT: 1883

  # ---------------------------------------------------------------------------
  # Frontend — lint
  # ---------------------------------------------------------------------------
  frontend-lint:
    name: Frontend Lint (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: camera-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: camera-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src/ --max-warnings=0

  # ---------------------------------------------------------------------------
  # Frontend — test
  # ---------------------------------------------------------------------------
  frontend-test:
    name: Frontend Test (react-scripts)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: camera-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: camera-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --ci
